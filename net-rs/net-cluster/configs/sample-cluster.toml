# Sample cluster configuration for local testing.
#
# Run with:
#   cargo run -p net-cluster -- --config net-cluster/configs/sample-cluster.toml
#
# This spawns 5 nodes with degree-2 random topology, 10–100ms latency,
# and equal stake distribution.

num_nodes = 5
degree = 2
min_latency_ms = 10
max_latency_ms = 100

# Base config shared by all nodes (genesis, protocol params, etc.)
base_config = "net-node/configs/mainnet.toml"

# Port allocation: nodes get 30000, 30001, ..., 30004
base_port = 30000

# Reproducible topology
seed = 42

# Merged event output
output_events = "cluster-events.jsonl"

# Time window for cross-node event ordering
ordering_window_secs = 5.0

# Telemetry aggregator port
aggregator_port = 9100

# Stats reporting interval (seconds)
stats_interval_secs = 5

# Stake distribution
stake_distribution = "equal"

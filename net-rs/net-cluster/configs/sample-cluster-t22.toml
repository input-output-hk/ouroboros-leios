# Cluster with lazy-voter abstention pressed against the quorum threshold.
#
# Run with:
#   cargo run -p net-cluster -- --config net-cluster/configs/sample-cluster-t22.toml
#
# Stake distribution is `mainnet-shaped`: ~71% of nodes are relays
# (stake = 0, no votes) and ~29% are pools sharing the total stake
# uniformly.  With `num_nodes = 30` that yields ~9 pool nodes.
#
# Committee selection is top-stake-fraction (TSF) inherited from
# `mainnet.toml`: every pool in the top 99% of stake casts one
# weight-1 vote, so the committee size is 9 and the quorum threshold
# is `floor(0.75 × 9) = 6` voters.

num_nodes = 25
degree = 3
min_latency_ms = 5
max_latency_ms = 100

base_config = "net-node/configs/mainnet.toml"
base_port = 30300
seed = 42
output_events = "cluster-events-t22.jsonl"
ordering_window_secs = 1.0
aggregator_port = 9100
stats_interval_secs = 1
stake_distribution = "mainnet-shaped"
rb_generation_probability = 0.05
tx_rate = 1.0

[behaviour]
kind = "t22"
vote_threshold = 80
non_voting_threshold = 0
hide_eb_tx_received = true

[behaviour_selection]
kind = "all"

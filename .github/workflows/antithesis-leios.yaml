name: "antithesis-leios"

# Antithesis-specific images + test submission via Moog. Runs less
# often than the cardano-node-leios base build:
#
#   - push to main when antithesis/, demo/, or this workflow changes
#   - workflow_dispatch for ad-hoc runs
#
# The base image (`cardano-node-leios`) is built and published by the
# `cardano-node-leios` workflow; we consume the `:latest` tag from
# GHCR. If you want to pin to a specific base, override BASE_IMAGE in
# the matrix below.

on:
  push:
    branches:
      - main
    paths:
      - "antithesis/**"
      - "demo/**"
      - ".github/workflows/antithesis-leios.yaml"
      - "flake.lock"
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      base_image_tag:
        description: 'Tag of cardano-node-leios base image to use (default: latest)'
        required: false
        default: 'latest'
        type: string
      push_images:
        description: 'Push images to GHCR'
        required: false
        default: 'true'
        type: boolean
      submit_antithesis:
        description: 'Submit test run to Antithesis via Moog'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-images:
    name: "Build Antithesis Docker images"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install nix
        uses: cachix/install-nix-action@d1ca217b388ee87b2507a9a93bf01368bde7cec2 # v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            substituters = https://cache.nixos.org https://cache.iog.io
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=

      # Build tx-centrifuge statically and stage it into the build
      # context. The devnet Dockerfile COPYs it from
      # antithesis/artifacts/tx-centrifuge.
      - name: Build tx-centrifuge static binary
        run: |
          set -euo pipefail
          nix build .#tx-centrifuge-static -o result-tx-centrifuge
          mkdir -p antithesis/artifacts
          cp -v result-tx-centrifuge/bin/tx-centrifuge antithesis/artifacts/tx-centrifuge
          chmod +x antithesis/artifacts/tx-centrifuge

      - name: Resolve base image reference
        id: base
        run: |
          tag="${{ github.event.inputs.base_image_tag || 'latest' }}"
          echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cardano-node-leios:${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # antithesis-cardano-node-burst — derived from the base image.
      # Adds burst-demo configs/genesis and node0/downstream scripts.
      # ----------------------------------------------------------------
      - name: Extract metadata for antithesis-cardano-node-burst
        id: meta-burst
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/antithesis-cardano-node-burst
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build antithesis-cardano-node-burst image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.cardano-node-burst
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-burst.outputs.tags }}
          labels: ${{ steps.meta-burst.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.ref }}
          cache-from: type=gha,scope=antithesis-cardano-node-burst
          cache-to: type=gha,mode=max,scope=antithesis-cardano-node-burst

      # ----------------------------------------------------------------
      # antithesis-cardano-node-devnet — derived from the base image.
      # Adds proto-devnet configs, pool keys, tx-centrifuge, and
      # pool-mode scripts.
      # ----------------------------------------------------------------
      - name: Extract metadata for antithesis-cardano-node-devnet
        id: meta-devnet
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/antithesis-cardano-node-devnet
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build antithesis-cardano-node-devnet image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.cardano-node-devnet
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-devnet.outputs.tags }}
          labels: ${{ steps.meta-devnet.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.ref }}
          cache-from: type=gha,scope=antithesis-cardano-node-devnet
          cache-to: type=gha,mode=max,scope=antithesis-cardano-node-devnet

      # ----------------------------------------------------------------
      # antithesis-immdb-server — Antithesis infra.
      # ----------------------------------------------------------------
      - name: Extract metadata for antithesis-immdb-server
        id: meta-immdb
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/antithesis-immdb-server
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build antithesis-immdb-server image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.immdb-server
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-immdb.outputs.tags }}
          labels: ${{ steps.meta-immdb.outputs.labels }}
          cache-from: type=gha,scope=antithesis-immdb-server
          cache-to: type=gha,mode=max,scope=antithesis-immdb-server

      # ----------------------------------------------------------------
      # antithesis-analysis — post-run analysis image.
      # ----------------------------------------------------------------
      - name: Extract metadata for antithesis-analysis
        id: meta-analysis
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/antithesis-analysis
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build antithesis-analysis image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.analysis
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-analysis.outputs.tags }}
          labels: ${{ steps.meta-analysis.outputs.labels }}
          cache-from: type=gha,scope=antithesis-analysis
          cache-to: type=gha,mode=max,scope=antithesis-analysis

  # ==========================================================================
  # Submit to Antithesis via Moog
  # ==========================================================================
  # Requires the following GitHub configuration:
  #
  # Secrets:
  #   MOOG_GITHUB_PAT        - GitHub PAT for Moog API access
  #   MOOG_REQUESTER_WALLET  - Base64-encoded Cardano preprod wallet JSON
  #
  # Variables:
  #   MOOG_MPFS_HOST         - MPFS service URL (default: https://mpfs.plutimus.com)
  #   MOOG_REQUESTER         - GitHub username registered as Moog requester
  #   MOOG_TOKEN_ID          - ID for Antithesis tenant (default is CF's)
  #
  # Prerequisites:
  #   - Requester registered with Moog (Ed25519 keypair, CODEOWNERS entry)
  #   - CF Moog agent has whitelisted this repository
  #
  check-moog-secrets:
    name: "Check Moog secrets"
    runs-on: ubuntu-latest
    # Submission fires on main pushes and when explicitly requested via
    # workflow_dispatch.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.submit_antithesis == 'true')
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          MOOG_PAT: ${{ secrets.MOOG_GITHUB_PAT }}
        run: |
          if [ -n "$MOOG_PAT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "Moog secrets not configured — skipping submission"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  submit-antithesis:
    name: "Submit Antithesis test via Moog"
    runs-on: ubuntu-latest
    needs: [build-images, check-moog-secrets]
    if: needs['check-moog-secrets'].outputs.available == 'true'
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      MOOG_WALLET_FILE: wallet.json
      MOOG_MPFS_HOST: ${{ vars.MOOG_MPFS_HOST || 'https://mpfs.plutimus.com' }}
      MOOG_PLATFORM: github
      MOOG_REQUESTER: ${{ vars.MOOG_REQUESTER }}
      MOOG_TOKEN_ID: ${{ vars.MOOG_TOKEN_ID || '21c523c3b4565f1fc1ad7e54e82ca976f60997d8e7e9946826813fabf341069b' }} # not a secret
      DURATION: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Pin Moog release tag
        id: moog-release
        run: |
          # Pin the Moog requester CLI to the v0.5.x line so it matches the
          # deployed MPFS/agent/oracle stack at MOOG_MPFS_HOST. Do NOT track
          # the "latest" release: moog v2.x (the moog-v2 MPFS cutover) is
          # incompatible with the deployed v0.5.x MPFS — its `facts test-runs`
          # queries a /status endpoint that 404s and returns an error envelope
          # instead of the array the jq below expects, which breaks submission
          # with `jq: Cannot index string with string "key"`. Bump this tag
          # only once the whole stack has migrated to v2.
          TAG=v0.5.1.5
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Moog release: $TAG"

      - name: Download and install Moog
        run: |
          VERSION="${MOOG_TAG#v}"
          gh release download "$MOOG_TAG" \
            -R cardano-foundation/moog \
            -p "moog-${VERSION}-x86_64-linux-musl.tar.gz" -O moog.tar.gz
          tar xzf moog.tar.gz
          sudo mv moog /usr/local/bin/
          moog --version
        env:
          GH_TOKEN: ${{ secrets.MOOG_GITHUB_PAT }}
          MOOG_TAG: ${{ steps.moog-release.outputs.tag }}

      - name: Configure wallet
        run: echo "$MOOG_WALLET" | base64 -d > wallet.json
        env:
          MOOG_WALLET: ${{ secrets.MOOG_REQUESTER_WALLET }}

      - name: Submit test to Antithesis
        id: request
        run: |
          set -euo pipefail
          TRY=$(moog facts test-runs --whose "$MOOG_REQUESTER" \
            | jq --arg sha "$GITHUB_SHA" 'map(select(.key.commitId == $sha)) | length')
          TRY=$((TRY + 1))
          echo "Submitting Antithesis test for commit ${GITHUB_SHA} (try $TRY, duration ${DURATION}h)..."
          RESULT=$(moog requester create-test \
            -d "antithesis/testnets/leios-devnet" \
            -c "${GITHUB_SHA}" \
            -r "${GITHUB_REPOSITORY}" \
            --try "$TRY" \
            -t "$DURATION")
          echo "$RESULT"
          ID=$(echo "$RESULT" | jq -e .value.testRunId | jq -r .)
          TXID=$(echo "$RESULT" | jq -e .txHash | jq -r .)
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "txHash=$TXID" >> "$GITHUB_OUTPUT"
        env:
          MOOG_GITHUB_PAT: ${{ secrets.MOOG_GITHUB_PAT }}

      - name: Wait for results
        run: timeout $(((DURATION + 1) * 3600)) ./antithesis/scripts/wait-for-test.sh "${{ steps.request.outputs.id }}"

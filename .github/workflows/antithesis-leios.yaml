name: "antithesis-leios"

# Antithesis-specific images + test submission via Moog. Runs less
# often than the cardano-node-leios base build:
#
#   - push to main when antithesis/, demo/, or this workflow changes
#   - workflow_dispatch for ad-hoc runs
#
# The base image (`cardano-node-leios`) is built and published by the
# `cardano-node-leios` workflow; we consume the `:latest` tag from
# GHCR. If you want to pin to a specific base, override BASE_IMAGE in
# the matrix below.

on:
  push:
    branches:
      - main
    paths:
      - "antithesis/**"
      - "demo/**"
      - ".github/workflows/antithesis-leios.yaml"
      - "flake.lock"
  workflow_dispatch:
    inputs:
      base_image_tag:
        description: 'Tag of cardano-node-leios base image to use (default: latest)'
        required: false
        default: 'latest'
        type: string
      push_images:
        description: 'Push images to GHCR'
        required: false
        default: 'true'
        type: boolean
      submit_antithesis:
        description: 'Submit test run to Antithesis via Moog'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-images:
    name: "Build Antithesis Docker images"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Extract cardano-node refs from flake.lock for the bp image
      # (still built via Dockerfile / cabal, not via nix).
      - name: Extract cardano-node refs from flake.lock
        id: refs
        run: |
          cn_leios=$(jq -r '.nodes["cardano-node-leios"].locked.rev' flake.lock)
          cn_txcent=$(jq -r '.nodes["cardano-node-tx-centrifuge"].locked.rev' flake.lock)
          for name in cn_leios cn_txcent; do
            value=${!name}
            if [ -z "$value" ] || [ "$value" = "null" ]; then
              echo "::error::Failed to extract $name from flake.lock"
              exit 1
            fi
          done
          {
            echo "cn_leios=$cn_leios"
            echo "cn_txcent=$cn_txcent"
          } >> "$GITHUB_OUTPUT"
          echo "cardano-node-leios: $cn_leios"
          echo "cardano-node (tx-centrifuge): $cn_txcent"

      - name: Resolve base image reference
        id: base
        run: |
          tag="${{ github.event.inputs.base_image_tag || 'latest' }}"
          echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cardano-node-leios:${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # cardano-node-antithesis — derived from the base image. Adds
      # proto-devnet configs, genesis files, and per-role scripts.
      # ----------------------------------------------------------------
      - name: Extract metadata for cardano-node-antithesis
        id: meta-antithesis
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cardano-node-antithesis
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build cardano-node-antithesis image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.cardano-node
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-antithesis.outputs.tags }}
          labels: ${{ steps.meta-antithesis.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.ref }}
          cache-from: type=gha,scope=cardano-node-antithesis
          cache-to: type=gha,mode=max,scope=cardano-node-antithesis

      # ----------------------------------------------------------------
      # cardano-node-bp — block-producer image (separate Dockerfile,
      # builds cardano-node + tx-centrifuge from source).
      # ----------------------------------------------------------------
      - name: Extract metadata for cardano-node-bp
        id: meta-bp
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cardano-node-bp
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build cardano-node-bp image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.cardano-node-bp
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-bp.outputs.tags }}
          labels: ${{ steps.meta-bp.outputs.labels }}
          build-args: |
            CARDANO_NODE_VERSION_LEIOS=${{ steps.refs.outputs.cn_leios }}
            CARDANO_NODE_VERSION_TXCENT=${{ steps.refs.outputs.cn_txcent }}
          cache-from: type=gha,scope=cardano-node-bp
          cache-to: type=gha,mode=max,scope=cardano-node-bp

      # ----------------------------------------------------------------
      # immdb-server — Antithesis infra.
      # ----------------------------------------------------------------
      - name: Extract metadata for immdb-server
        id: meta-immdb
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/immdb-server
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build immdb-server image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.immdb-server
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-immdb.outputs.tags }}
          labels: ${{ steps.meta-immdb.outputs.labels }}
          cache-from: type=gha,scope=immdb-server
          cache-to: type=gha,mode=max,scope=immdb-server

      # ----------------------------------------------------------------
      # leios-analysis — post-run analysis image.
      # ----------------------------------------------------------------
      - name: Extract metadata for analysis
        id: meta-analysis
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/leios-analysis
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build analysis image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./antithesis/Dockerfile.analysis
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta-analysis.outputs.tags }}
          labels: ${{ steps.meta-analysis.outputs.labels }}
          cache-from: type=gha,scope=leios-analysis
          cache-to: type=gha,mode=max,scope=leios-analysis

  # ==========================================================================
  # Submit to Antithesis via Moog
  # ==========================================================================
  # Requires the following GitHub configuration:
  #
  # Secrets:
  #   MOOG_GITHUB_PAT        - GitHub PAT for Moog API access
  #   MOOG_REQUESTER_WALLET  - Base64-encoded Cardano preprod wallet JSON
  #
  # Variables:
  #   MOOG_MPFS_HOST         - MPFS service URL (default: https://mpfs.plutimus.com)
  #   MOOG_REQUESTER         - GitHub username registered as Moog requester
  #   MOOG_TOKEN_ID          - ID for Antithesis tenant (default is CF's)
  #
  # Prerequisites:
  #   - Requester registered with Moog (Ed25519 keypair, CODEOWNERS entry)
  #   - CF Moog agent has whitelisted this repository
  #
  check-moog-secrets:
    name: "Check Moog secrets"
    runs-on: ubuntu-latest
    # Submission fires on main pushes and when explicitly requested via
    # workflow_dispatch.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.submit_antithesis == 'true')
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          MOOG_PAT: ${{ secrets.MOOG_GITHUB_PAT }}
        run: |
          if [ -n "$MOOG_PAT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "Moog secrets not configured — skipping submission"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  submit-antithesis:
    name: "Submit Antithesis test via Moog"
    runs-on: ubuntu-latest
    needs: [build-images, check-moog-secrets]
    if: needs['check-moog-secrets'].outputs.available == 'true'
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      MOOG_WALLET_FILE: wallet.json
      MOOG_MPFS_HOST: ${{ vars.MOOG_MPFS_HOST || 'https://mpfs.plutimus.com' }}
      MOOG_PLATFORM: github
      MOOG_REQUESTER: ${{ vars.MOOG_REQUESTER }}
      MOOG_TOKEN_ID: ${{ vars.MOOG_TOKEN_ID || '21c523c3b4565f1fc1ad7e54e82ca976f60997d8e7e9946826813fabf341069b' }} # not a secret
      DURATION: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Get latest Moog release tag
        id: moog-release
        run: |
          TAG=$(gh api repos/cardano-foundation/moog/releases/latest --jq '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Moog release: $TAG"
        env:
          GH_TOKEN: ${{ secrets.MOOG_GITHUB_PAT }}

      - name: Download and install Moog
        run: |
          gh release download "$MOOG_TAG" \
            -R cardano-foundation/moog \
            -p "moog-*-linux64.tar.gz" -O moog.tar.gz
          tar xzf moog.tar.gz
          sudo mv moog /usr/local/bin/
          moog --version
        env:
          GH_TOKEN: ${{ secrets.MOOG_GITHUB_PAT }}
          MOOG_TAG: ${{ steps.moog-release.outputs.tag }}

      - name: Configure wallet
        run: echo "$MOOG_WALLET" | base64 -d > wallet.json
        env:
          MOOG_WALLET: ${{ secrets.MOOG_REQUESTER_WALLET }}

      - name: Submit test to Antithesis
        id: request
        run: |
          set -euo pipefail
          TRY=$(moog facts test-runs --whose "$MOOG_REQUESTER" \
            | jq --arg sha "$GITHUB_SHA" 'map(select(.key.commitId == $sha)) | length')
          TRY=$((TRY + 1))
          echo "Submitting Antithesis test for commit ${GITHUB_SHA} (try $TRY, duration ${DURATION}h)..."
          RESULT=$(moog requester create-test \
            -d "antithesis/testnets/leios-devnet" \
            -c "${GITHUB_SHA}" \
            -r "${GITHUB_REPOSITORY}" \
            --try "$TRY" \
            -t "$DURATION")
          echo "$RESULT"
          ID=$(echo "$RESULT" | jq -e .value.testRunId | jq -r .)
          TXID=$(echo "$RESULT" | jq -e .txHash | jq -r .)
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "txHash=$TXID" >> "$GITHUB_OUTPUT"
        env:
          MOOG_GITHUB_PAT: ${{ secrets.MOOG_GITHUB_PAT }}

      - name: Wait for results
        run: timeout $(((DURATION + 1) * 3600)) ./antithesis/scripts/wait-for-test.sh "${{ steps.request.outputs.id }}"

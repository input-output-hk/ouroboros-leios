        <circle cx="120" cy="0" r="4" fill="rgba(255, 165, 0, 0.9)" stroke="#cc7a00" stroke-width="2" />
        <text x="135" y="5" text-anchor="start" font-family="Arial" font-size="12" fill="var(--svg-text-color, #333333)">

version: "0.5"

processes:
  SSHTTPExporter:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      ss_http_exporter 127.0.0.1 9100 "$SS_FILTER";

    availability:
      restart: "always"

  Prometheus:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      prometheus \
        --config.file="$PROMETHEUS_CONFIG" \
        --storage.tsdb.path="$WORKING_DIR/prometheus" \
        --web.listen-address="127.0.0.1:9090" \
        --web.enable-remote-write-receiver;

    availability:
      restart: "always"

  Loki:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      if [ -d "$WORKING_DIR/loki" ]; then
        rm -fr "$WORKING_DIR/loki";
        echo "Removed old Loki state $WORKING_DIR/loki"
      fi;

      loki -config.expand-env=true -config.file="$LOKI_CONFIG";

    availability:
      restart: "always"

  Alloy:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      if [ -d "$WORKING_DIR/alloy" ]; then
        rm -fr "$WORKING_DIR/alloy";
        echo "Removed old Alloy state $WORKING_DIR/alloy"
      fi;

      alloy run \
        --storage.path "$WORKING_DIR/alloy" \
        "$ALLOY_CONFIG";

    depends_on:
      Prometheus:
        condition: "process_started"
      Loki:
        condition: "process_started"
    shutdown:
      signal: 9
      parent_only: false

    availability:
      restart: "always"

  Grafana:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      mkdir -p "$WORKING_DIR/grafana"

      grafana server \
        --config "$GRAFANA_INI" \
        --homepath "$GRAFANA_SHARE";

    availability:
      restart: "always"

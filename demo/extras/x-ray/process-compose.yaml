version: "0.5"

processes:
  SSHTTPExporter:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      ss_http_exporter 127.0.0.1 9100 "$SS_FILTER";

    availability:
      restart: "always"

  Prometheus:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      prometheus \
        --config.file="$PROMETHEUS_CONFIG" \
        --storage.tsdb.path="$WORKING_DIR/prometheus" \
        --web.listen-address="127.0.0.1:9090" \
        --web.enable-remote-write-receiver;

    availability:
      restart: "always"

  Loki:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      if [ -d "$WORKING_DIR/loki" ]; then
        rm -fr "$WORKING_DIR/loki";
        echo "Removed old Loki state $WORKING_DIR/loki"
      fi;

      loki -config.expand-env=true -config.file="$LOKI_CONFIG";

    availability:
      restart: "always"

  Alloy:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      if [ -d "$WORKING_DIR/alloy" ]; then
        rm -fr "$WORKING_DIR/alloy";
        echo "Removed old Alloy state $WORKING_DIR/alloy"
      fi;

      alloy run \
        --storage.path "$WORKING_DIR/alloy" \
        "$ALLOY_CONFIG";

    depends_on:
      Prometheus:
        condition: "process_started"
      Loki:
        condition: "process_started"
    shutdown:
      signal: 9
      parent_only: false

    availability:
      restart: "always"

  Grafana:
    namespace: x-ray
    command: |
      set -exuo pipefail;

      # Grafana's INI env-var expansion is fragile (in 12.x it picked up
      # WORKING_DIR=leios-testnet from an outer shell, treated it as relative
      # to --homepath, and tried to mkdir inside the read-only nix store).
      # Pin the writable paths via GF_PATHS_* env vars, which override the INI
      # unconditionally.
      mkdir -p "$WORKING_DIR/grafana/data" \
               "$WORKING_DIR/grafana/logs" \
               "$WORKING_DIR/grafana/plugins"
      export GF_PATHS_DATA="$WORKING_DIR/grafana/data"
      export GF_PATHS_LOGS="$WORKING_DIR/grafana/logs"
      export GF_PATHS_PLUGINS="$WORKING_DIR/grafana/plugins"
      export GF_PATHS_PROVISIONING="$GRAFANA_HOMEPATH/conf/provisioning"

      grafana server \
        --config "$GRAFANA_INI" \
        --homepath "$GRAFANA_SHARE";

    availability:
      restart: "always"

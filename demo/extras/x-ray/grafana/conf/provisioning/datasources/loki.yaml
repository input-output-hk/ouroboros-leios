apiVersion: 1

datasources:
  - name: Loki
    # uid pinned to "loki" to match cardano-playground's datasource uid so the
    # leios dashboards are portable between the two stacks.
    uid: loki
    type: loki
    access: proxy
    url: http://localhost:3100
    jsonData:
      timeout: 60
      maxLines: 1000

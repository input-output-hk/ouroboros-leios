apiVersion: 1

providers:
  - name: Default
    folder: Cardano dashboards
    type: file
    options:
      path: "${GRAFANA_HOMEPATH}/dashboards"

  - name: Demo
    folder: Demo dashboards
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: "${DEMO_DASHBOARDS_DIR}"
      foldersFromFilesStructure: false

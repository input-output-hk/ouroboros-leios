version: "0.5"
is_strict: true

processes:
  Node1:
    command: |
      NODE_DIR="${WORKING_DIR}/node1" \
      IP="${IP_NODE1}" \
      PORT="${PORT_NODE1}" \
      bash "${SOURCE_DIR}/run-node.sh"
    log_location: "${WORKING_DIR}/node1/node.log"

  Node2:
    command: |
      NODE_DIR="${WORKING_DIR}/node2" \
      IP="${IP_NODE2}" \
      PORT="${PORT_NODE2}" \
      bash "${SOURCE_DIR}/run-node.sh"
    log_location: "${WORKING_DIR}/node2/node.log"

  Node3:
    command: |
      NODE_DIR="${WORKING_DIR}/node3" \
      IP="${IP_NODE3}" \
      PORT="${PORT_NODE3}" \
      bash "${SOURCE_DIR}/run-node.sh"
    log_location: "${WORKING_DIR}/node3/node.log"

  TxGenerator:
    command: while [ ! -S ${WORKING_DIR}/node1/node.socket ]; do sleep 0.5; done && cd ${WORKING_DIR} && tx-generator json_highlevel gen.json
    depends_on:
      Node1:
        condition: process_started
      Node2:
        condition: process_started
      Node3:
        condition: process_started

  ObserveTip:
    environment:
      - CARDANO_NODE_NETWORK_ID=164
      - CARDANO_NODE_SOCKET_PATH=${WORKING_DIR}/node1/node.socket
    command: watch -n0.1 "cardano-cli query tip && cardano-cli query tx-mempool info"
    is_interactive: true
    depends_on:
      Node1:
        condition: process_started

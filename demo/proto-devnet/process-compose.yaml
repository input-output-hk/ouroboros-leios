version: "0.5"
is_strict: true

processes:
  Node1:
    command: |
      NODE_DIR="${WORKING_DIR}/node1" \
      IP="${IP_NODE1}" \
      PORT="${PORT_NODE1}" \
      bash "${SOURCE_DIR}/run-node.sh"
    log_location: "${WORKING_DIR}/node1/node.log"
    readiness_probe:
      exec:
        command: "bash -c ': </dev/tcp/${IP_NODE1}/${PORT_NODE1}'"
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 60

  Node2:
    command: |
      NODE_DIR="${WORKING_DIR}/node2" \
      IP="${IP_NODE2}" \
      PORT="${PORT_NODE2}" \
      bash "${SOURCE_DIR}/run-node.sh"
    log_location: "${WORKING_DIR}/node2/node.log"
    readiness_probe:
      exec:
        command: "bash -c ': </dev/tcp/${IP_NODE2}/${PORT_NODE2}'"
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 60

  Node3:
    command: |
      NODE_DIR="${WORKING_DIR}/node3" \
      IP="${IP_NODE3}" \
      PORT="${PORT_NODE3}" \
      bash "${SOURCE_DIR}/run-node.sh"
    log_location: "${WORKING_DIR}/node3/node.log"
    readiness_probe:
      exec:
        command: "bash -c ': </dev/tcp/${IP_NODE3}/${PORT_NODE3}'"
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 60

  TxFirehose:
    working_dir: ${WORKING_DIR}
    command: tx-firehose firehose.json
    log_location: "${WORKING_DIR}/tx-firehose.log"
    depends_on:
      Node1:
        condition: process_healthy

  ObserveTip:
    environment:
      - CARDANO_NODE_NETWORK_ID=164
      - CARDANO_NODE_SOCKET_PATH=${WORKING_DIR}/node1/node.socket
    command: watch -n0.1 "cardano-cli query tip && cardano-cli query tx-mempool info"
    is_interactive: true
    depends_on:
      Node1:
        condition: process_started

  ObserveTip2:
    environment:
      - CARDANO_NODE_NETWORK_ID=164
      - CARDANO_NODE_SOCKET_PATH=${WORKING_DIR}/node2/node.socket
    command: watch -n10 "cardano-cli query tip && cardano-cli query tx-mempool info"
    is_interactive: true
    depends_on:
      Node2:
        condition: process_started

  ObserveTip3:
    environment:
      - CARDANO_NODE_NETWORK_ID=164
      - CARDANO_NODE_SOCKET_PATH=${WORKING_DIR}/node3/node.socket
    command: watch -n10 "cardano-cli query tip && cardano-cli query tx-mempool info"
    is_interactive: true
    depends_on:
      Node3:
        condition: process_started
